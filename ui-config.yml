---
type: zero-touch

# Split view: 35% lab guide left, 65% OCP Console right
default_width: 35
persist_url_state: true

antora:
  name: modules
  dir: www
  modules:
    - name: module-01
      label: "Module 1: Deploy a Workload"
      scripts:
        - setup
        - validation
        - solve
      solveButton: true
    - name: module-02
      label: "Module 2: Compliance Label"
      scripts:
        - setup
        - validation
        - solve
      solveButton: true
    - name: conclusion
      label: "Conclusion"

tabs:
  - name: OCP Console
    url: 'https://console-openshift-console.${DOMAIN}'
    external: false
  - name: Terminal
    url: /terminal
    type: terminal

skipModuleEnabled: true
