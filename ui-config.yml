---
type: zero-touch

# Split view: 35% lab guide left, 65% OCP Console right
default_width: 35
persist_url_state: true
view_switcher:
  enabled: true
  default_mode: split

antora:
  name: modules
  dir: www
  modules:
    - name: index
      label: "Welcome"
    - name: module-01
      label: "Module 1: Create a ConfigMap"
      scripts:
        - setup
        - validation
        - solve
      solveButton: true
    - name: module-02
      label: "Module 2: Create a Secret"
      scripts:
        - setup
        - validation
        - solve
      solveButton: true
    - name: conclusion
      label: "Conclusion"

tabs:
  - name: OCP Console
    url: 'https://console-openshift-console.${DOMAIN}'
    external: false

skipModuleEnabled: true
