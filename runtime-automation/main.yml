---
# =============================================================================
# runtime-automation/main.yml
# Entry point for ansible-runner in the nookbag-sidecar container.
# Runs locally inside the pod — no SSH needed.
# Vars injected by sidecar: module_dir, module_stage, job_info_dir
# =============================================================================

- name: Run module stage
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Run {{ module_stage }} for {{ module_dir }}
      ansible.builtin.include_tasks: "{{ module_dir }}/{{ module_stage }}.yml"
