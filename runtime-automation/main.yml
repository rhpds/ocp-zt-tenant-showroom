---
# =============================================================================
# runtime-automation/main.yml
# Entry point for zerotouch-automation runner (connection: local).
# 1. Reads showroom-userdata ConfigMap (SA token → own namespace)
# 2. oc login as student user — handles RHBK OAuth redirect chain
# 3. All kubernetes.core tasks use student kubeconfig → scoped to student namespace
# No RBAC role needed — student is already admin of their namespace.
# =============================================================================

- name: Run module stage
  hosts: localhost
  connection: local
  gather_facts: false

  pre_tasks:
    - name: Read showroom-userdata ConfigMap via SA token
      ansible.builtin.uri:
        url: >-
          https://kubernetes.default.svc/api/v1/namespaces/{{
            lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/namespace')
          }}/configmaps/showroom-userdata
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
        status_code: 200
      register: r_userdata

    - name: Parse user data
      ansible.builtin.set_fact:
        _userdata: "{{ r_userdata.json.data['user_data.yml'] | from_yaml }}"

    - name: Login to OCP as student user via oc
      ansible.builtin.command:
        cmd: >-
          oc login {{ _userdata.openshift_api_url }}
          --username={{ _userdata.user }}
          --password={{ _userdata.password }}
          --insecure-skip-tls-verify=true
          --kubeconfig=/tmp/student-kubeconfig
      changed_when: true
      no_log: true

  vars:
    student_user: "{{ _userdata.user }}"
    student_ns: "{{ _userdata.user }}-zttest"
    k8s_kubeconfig: "/tmp/student-kubeconfig"

  tasks:
    - name: "Run {{ module_stage }} for {{ module_dir }}"
      ansible.builtin.include_tasks: "{{ module_dir }}/{{ module_stage }}.yml"
