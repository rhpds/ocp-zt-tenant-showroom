---
# =============================================================================
# runtime-automation/main.yml
# Entry point for zerotouch-automation runner (connection: local).
# Reads showroom-userdata ConfigMap to get student credentials,
# gets an OCP OAuth token, and uses it for all kubernetes.core calls.
# No RBAC role needed — student already has admin on their namespace.
# =============================================================================

- name: Run module stage
  hosts: localhost
  connection: local
  gather_facts: false

  pre_tasks:
    - name: Read showroom-userdata ConfigMap via SA token
      ansible.builtin.uri:
        url: >-
          https://kubernetes.default.svc/api/v1/namespaces/{{
            lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/namespace')
          }}/configmaps/showroom-userdata
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
        status_code: 200
      register: r_userdata

    - name: Parse user data
      ansible.builtin.set_fact:
        _userdata: "{{ r_userdata.json.data['user_data.yml'] | from_yaml }}"

    - name: Get OCP OAuth token using student credentials
      ansible.builtin.uri:
        url: >-
          https://oauth-openshift.{{ _userdata.openshift_cluster_ingress_domain
          }}/oauth/authorize?response_type=token&client_id=openshift-challenging-client
        user: "{{ _userdata.user }}"
        password: "{{ _userdata.password }}"
        force_basic_auth: true
        validate_certs: false
        follow_redirects: none
        status_code: [301, 302]
      register: r_oauth

    - name: Extract OAuth token
      ansible.builtin.set_fact:
        _ocp_token: >-
          {{ r_oauth.location | regex_search('access_token=([^&]+)', '\1') | first }}

  vars:
    student_user: "{{ _userdata.user }}"
    student_ns: "{{ _userdata.user }}-zttest"
    k8s_host: "https://kubernetes.default.svc"
    k8s_token: "{{ _ocp_token }}"

  tasks:
    - name: "Run {{ module_stage }} for {{ module_dir }}"
      ansible.builtin.include_tasks: "{{ module_dir }}/{{ module_stage }}.yml"
