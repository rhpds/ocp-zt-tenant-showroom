---
# Module 1 Validation — runs when student clicks Next
- name: Get student username
  ansible.builtin.command: oc whoami
  register: r_whoami
  changed_when: false

- name: Set student namespace fact
  ansible.builtin.set_fact:
    student_ns: "zt-test-{{ r_whoami.stdout | trim }}"

- name: Check namespace exists
  ansible.builtin.command: oc get namespace {{ student_ns }}
  register: r_ns
  changed_when: false
  failed_when: false

- name: Fail — namespace not found
  when: r_ns.rc != 0
  ansible.builtin.copy:
    dest: "{{ job_info_dir }}/validation_failure.out"
    content: |
      Namespace {{ student_ns }} not found.

      Create it first:
        oc new-project {{ student_ns }}
  notify: fail validation

- name: Check ConfigMap exists
  ansible.builtin.command: oc get configmap zt-test-config -n {{ student_ns }}
  register: r_cm
  changed_when: false
  failed_when: false

- name: Fail — ConfigMap not found
  when: r_cm.rc != 0
  ansible.builtin.copy:
    dest: "{{ job_info_dir }}/validation_failure.out"
    content: |
      ConfigMap zt-test-config not found in {{ student_ns }}.

      Create it:
        oc create configmap zt-test-config \
          --from-literal=env=test \
          -n {{ student_ns }}
  notify: fail validation

- name: Check Deployment exists
  ansible.builtin.command: oc get deployment zt-test-app -n {{ student_ns }}
  register: r_deploy
  changed_when: false
  failed_when: false

- name: Fail — Deployment not found
  when: r_deploy.rc != 0
  ansible.builtin.copy:
    dest: "{{ job_info_dir }}/validation_failure.out"
    content: |
      Deployment zt-test-app not found in {{ student_ns }}.

      Create it:
        oc create deployment zt-test-app \
          --image=registry.access.redhat.com/ubi9/nginx-122:latest \
          -n {{ student_ns }}
  notify: fail validation

- name: Check pod is Running
  ansible.builtin.command: >
    oc get pods -n {{ student_ns }} -l app=zt-test-app
    --field-selector=status.phase=Running --no-headers
  register: r_pods
  changed_when: false
  failed_when: false

- name: Fail — pod not Running yet
  when: r_pods.stdout | trim == ""
  ansible.builtin.copy:
    dest: "{{ job_info_dir }}/validation_failure.out"
    content: |
      Deployment zt-test-app exists but no pod is Running yet.

      Check status:
        oc get pods -n {{ student_ns }} -l app=zt-test-app

      Wait for Running state then click Validate again.
  notify: fail validation

- name: All checks passed
  ansible.builtin.debug:
    msg: "Module 1 validation passed for {{ student_ns }}"

  handlers:
    - name: fail validation
      ansible.builtin.fail:
        msg: "Validation failed — see validation_failure.out"
