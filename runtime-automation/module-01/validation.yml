---
- name: Module 1 Validation — check ConfigMap
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Check ConfigMap exists
      kubernetes.core.k8s_info:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        api_version: v1
        kind: ConfigMap
        name: zt-test-config
        namespace: "{{ student_ns }}"
      register: r_cm

    - name: Validate ConfigMap
      validation_check:
        check: "{{ r_cm.resources | length > 0 }}"
        pass_msg: "ConfigMap zt-test-config exists in {{ student_ns }}"
        error_msg: |
          ConfigMap zt-test-config not found in {{ student_ns }}.

          Create it:
            oc create configmap zt-test-config \
              --from-literal=env=test \
              -n {{ student_ns }}
