---
# Module 1 Setup — verify student namespace exists (pre-created at deploy time)
- name: Check student namespace exists
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: "{{ student_ns }}"
  register: r_ns

- name: Report setup status
  ansible.builtin.debug:
    msg: >-
      {{ 'Namespace ' + student_ns + ' is ready.' if r_ns.resources | length > 0
         else 'WARNING: namespace ' + student_ns + ' not found.' }}
