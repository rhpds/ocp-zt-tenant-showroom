---
# Module 1 Setup — create student namespace
- name: Create student namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ student_ns }}"
        labels:
          lab: zt-test
  ignore_errors: true

- name: Report setup complete
  ansible.builtin.debug:
    msg: "Namespace {{ student_ns }} ready"
