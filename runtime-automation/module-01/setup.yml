---
# Module 1 Setup — create student namespace
- name: Create student namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ student_ns }}"
        labels:
          lab: zt-test
  ignore_errors: true

- name: Grant student user admin access to their namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: "{{ student_user }}-admin"
        namespace: "{{ student_ns }}"
      subjects:
        - kind: User
          name: "{{ student_user }}"
          apiGroup: rbac.authorization.k8s.io
      roleRef:
        kind: ClusterRole
        name: admin
        apiGroup: rbac.authorization.k8s.io
  ignore_errors: true

- name: Report setup complete
  ansible.builtin.debug:
    msg: "Namespace {{ student_ns }} ready"
