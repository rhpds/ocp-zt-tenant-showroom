---
# Module 1 Setup — verify student namespace exists
- name: Check student namespace exists
  kubernetes.core.k8s_info:
    kubeconfig: "{{ k8s_kubeconfig }}"
    api_version: v1
    kind: Namespace
    name: "{{ student_ns }}"
  register: r_ns

- name: Report setup status
  ansible.builtin.debug:
    msg: "Namespace {{ student_ns }} is ready."
