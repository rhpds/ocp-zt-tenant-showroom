---
- name: Module 1 Setup — verify student namespace
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Read showroom-userdata ConfigMap
      ansible.builtin.uri:
        url: >-
          https://kubernetes.default.svc/api/v1/namespaces/{{
            lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/namespace')
          }}/configmaps/showroom-userdata
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
        status_code: 200
      register: r_userdata

    - name: Parse user data
      ansible.builtin.set_fact:
        student_user: "{{ (r_userdata.json.data['user_data.yml'] | from_yaml).user }}"
        student_ns: "{{ (r_userdata.json.data['user_data.yml'] | from_yaml).user }}-zttest"

    - name: Check student namespace exists
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Namespace
        name: "{{ student_ns }}"
      register: r_ns

    - name: Report setup status
      ansible.builtin.debug:
        msg: "Namespace {{ student_ns }} is {{ 'ready' if r_ns.resources | length > 0 else 'not found' }}"
