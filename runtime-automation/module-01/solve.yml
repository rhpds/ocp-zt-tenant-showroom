---
# Module 1 Solve — create a ConfigMap in the student namespace
- name: Create ConfigMap
  kubernetes.core.k8s:
    host: "{{ k8s_host }}"
    api_key: "{{ k8s_token }}"
    validate_certs: false
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: zt-test-config
        namespace: "{{ student_ns }}"
      data:
        env: test
        solved-by: zerotouch

- name: Solve complete
  ansible.builtin.debug:
    msg: "Module 1 solved for {{ student_ns }}"
