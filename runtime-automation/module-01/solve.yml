---
- name: Module 1 Solve — create ConfigMap
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: lab-config
            namespace: "{{ student_ns }}"
          data:
            env: dev
            owner: "{{ student_user }}"
            solved-by: showroom
