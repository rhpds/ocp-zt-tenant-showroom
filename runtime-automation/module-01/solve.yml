---
# SOLVE — Module 1: CLI + Console
# Lab type: OCP Tenant
# Extravars: k8s_kubeconfig, student_ns, student_user, guid
#
# Steps:
#   1. Create ConfigMap lab-config    → kubernetes.core.k8s
#   2. Create Secret lab-secret       → kubernetes.core.k8s
#   3. Label ConfigMap app=lab        → kubernetes.core.k8s (API equivalent)
#
# NOTE: Step 3 is done via OCP Console in the lab.
# The Playwright version (playwright/step-03-label-configmap.js) is generated
# but requires 'playwright' npm package in the runner image.
# Using kubernetes.core patch here as it produces identical state.

- name: Module 1 Solve
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:

    - name: Create ConfigMap lab-config
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: lab-config
            namespace: "{{ student_ns }}"
          data:
            env: dev
            owner: "{{ student_user }}"

    - name: Create Secret lab-secret
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: lab-secret
            namespace: "{{ student_ns }}"
          stringData:
            api-key: my-secret-value

    - name: Label ConfigMap lab-config with app=lab (API equivalent of Console step)
      kubernetes.core.k8s:
        kubeconfig: "{{ k8s_kubeconfig | default(omit) }}"
        validate_certs: false
        state: patched
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: lab-config
            namespace: "{{ student_ns }}"
            labels:
              app: lab
