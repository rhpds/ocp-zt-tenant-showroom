---
# Module 1 Solve — create ConfigMap and Deployment in pre-created namespace

- name: Create ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: zt-test-config
        namespace: "{{ student_ns }}"
        labels:
          lab: zt-test
      data:
        env: test
        solved-by: zerotouch

- name: Create Deployment
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: zt-test-app
        namespace: "{{ student_ns }}"
        labels:
          lab: zt-test
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: zt-test-app
        template:
          metadata:
            labels:
              app: zt-test-app
          spec:
            containers:
              - name: app
                image: registry.access.redhat.com/ubi9/nginx-122:latest
                ports:
                  - containerPort: 8080

- name: Wait for pod to be running
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ student_ns }}"
    label_selectors:
      - "app=zt-test-app"
    field_selectors:
      - "status.phase=Running"
    wait: true
    wait_timeout: 120
  register: r_pod
  until: r_pod.resources | length > 0
  retries: 24
  delay: 5

- name: Solve complete
  ansible.builtin.debug:
    msg: "Module 1 solved for {{ student_ns }}"
