---
# Module 1 Solve — runs when student clicks Solve
- name: Get student username
  ansible.builtin.command: oc whoami
  register: r_whoami
  changed_when: false

- name: Set student namespace fact
  ansible.builtin.set_fact:
    student_ns: "zt-test-{{ r_whoami.stdout | trim }}"

- name: Create namespace if missing
  ansible.builtin.command: oc new-project {{ student_ns }}
  register: r_ns
  changed_when: r_ns.rc == 0
  failed_when: r_ns.rc != 0 and 'AlreadyExists' not in r_ns.stderr

- name: Create ConfigMap (idempotent)
  ansible.builtin.command: >
    oc apply -n {{ student_ns }} -f -
  args:
    stdin: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: zt-test-config
        labels:
          lab: zt-test
      data:
        env: test
        solved-by: zerotouch
  changed_when: true

- name: Create Deployment (idempotent)
  ansible.builtin.command: >
    oc apply -n {{ student_ns }} -f -
  args:
    stdin: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: zt-test-app
        labels:
          lab: zt-test
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: zt-test-app
        template:
          metadata:
            labels:
              app: zt-test-app
          spec:
            containers:
              - name: app
                image: registry.access.redhat.com/ubi9/nginx-122:latest
                ports:
                  - containerPort: 8080
  changed_when: true

- name: Wait for pod to be Running
  ansible.builtin.command: oc rollout status deployment/zt-test-app -n {{ student_ns }} --timeout=120s
  changed_when: false

- name: Solve complete
  ansible.builtin.debug:
    msg: "Module 1 solved for {{ student_ns }}"
