---
# Module 2 Validation — check compliance=passed label

- name: Get namespace
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: "{{ student_ns }}"
  register: r_ns

- name: Set compliance label fact
  ansible.builtin.set_fact:
    compliance_label: "{{ r_ns.resources[0].metadata.labels.compliance | default('') }}"
  when: r_ns.resources | length > 0

- name: Fail — compliance label not set
  when: compliance_label | default('') != 'passed'
  block:
    - ansible.builtin.copy:
        dest: "{{ job_info_dir }}/validation_failure.out"
        content: |
          Compliance label not set on namespace {{ student_ns }}.

          Apply it:
            oc label namespace {{ student_ns }} compliance=passed --overwrite

          Then verify:
            oc get namespace {{ student_ns }} --show-labels
    - ansible.builtin.fail:
        msg: "Compliance label missing"

- name: Validation passed
  ansible.builtin.debug:
    msg: "Module 2 validation passed — compliance=passed on {{ student_ns }}"
