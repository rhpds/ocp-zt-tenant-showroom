---
# Module 2 Validation — check lab-status Secret exists
- name: Check lab-status Secret exists
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: lab-status
    namespace: "{{ student_ns }}"
  register: r_secret

- name: Fail — lab-status Secret not found
  when: r_secret.resources | length == 0
  block:
    - ansible.builtin.copy:
        dest: "{{ job_info_dir }}/validation_failure.out"
        content: |
          Secret lab-status not found in {{ student_ns }}.

          Create it:
            oc create secret generic lab-status \
              --from-literal=status=complete \
              -n {{ student_ns }}
    - ansible.builtin.fail:
        msg: "lab-status Secret missing"

- name: Validation passed
  ansible.builtin.debug:
    msg: "Module 2 validation passed — lab-status Secret exists in {{ student_ns }}"
