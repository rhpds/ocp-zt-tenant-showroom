---
# Module 2 Validation — check lab-status=complete label on namespace
- name: Get namespace
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: "{{ student_ns }}"
  register: r_ns

- name: Check lab-status label
  ansible.builtin.set_fact:
    lab_status: "{{ r_ns.resources[0].metadata.labels['lab-status'] | default('') }}"
  when: r_ns.resources | length > 0

- name: Fail — label not set
  when: lab_status | default('') != 'complete'
  block:
    - ansible.builtin.copy:
        dest: "{{ job_info_dir }}/validation_failure.out"
        content: |
          Label lab-status=complete not found on namespace {{ student_ns }}.

          Apply it:
            oc label namespace {{ student_ns }} lab-status=complete --overwrite
    - ansible.builtin.fail:
        msg: "Label missing"

- name: Validation passed
  ansible.builtin.debug:
    msg: "Module 2 validation passed — lab-status=complete on {{ student_ns }}"
