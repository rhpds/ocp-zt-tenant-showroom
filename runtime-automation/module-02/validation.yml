---
# Module 2 Validation — check compliance label
- name: Get student username
  ansible.builtin.command: oc whoami
  register: r_whoami
  changed_when: false

- name: Set student namespace fact
  ansible.builtin.set_fact:
    student_ns: "zt-test-{{ r_whoami.stdout | trim }}"

- name: Get namespace labels
  ansible.builtin.command: >
    oc get namespace {{ student_ns }} -o jsonpath='{.metadata.labels.compliance}'
  register: r_label
  changed_when: false
  failed_when: false

- name: Fail — compliance label not set
  when: r_label.stdout | trim != "passed"
  block:
    - ansible.builtin.copy:
        dest: "{{ job_info_dir }}/validation_failure.out"
        content: |
          Compliance label not set on namespace {{ student_ns }}.

          Apply it:
            oc label namespace {{ student_ns }} compliance=passed --overwrite

          Then verify:
            oc get namespace {{ student_ns }} --show-labels
    - ansible.builtin.fail:
        msg: "Validation failed — compliance label missing"

- name: Validation passed
  ansible.builtin.debug:
    msg: "Module 2 validation passed — compliance=passed on {{ student_ns }}"
