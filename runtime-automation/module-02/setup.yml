---
# Module 2 Setup — ensure baseline from module 1 exists
- name: Get student username
  ansible.builtin.command: oc whoami
  register: r_whoami
  changed_when: false

- name: Set student namespace fact
  ansible.builtin.set_fact:
    student_ns: "zt-test-{{ r_whoami.stdout | trim }}"

- name: Ensure namespace exists
  ansible.builtin.command: oc new-project {{ student_ns }}
  register: r_ns
  changed_when: r_ns.rc == 0
  failed_when: r_ns.rc != 0 and 'AlreadyExists' not in r_ns.stderr

- name: Ensure module-01 ConfigMap exists
  ansible.builtin.command: oc get configmap zt-test-config -n {{ student_ns }}
  register: r_cm
  changed_when: false
  failed_when: false

- name: Create ConfigMap if missing
  when: r_cm.rc != 0
  ansible.builtin.command: >
    oc create configmap zt-test-config --from-literal=env=test -n {{ student_ns }}
  changed_when: true

- name: Ensure module-01 Deployment exists
  ansible.builtin.command: oc get deployment zt-test-app -n {{ student_ns }}
  register: r_deploy
  changed_when: false
  failed_when: false

- name: Create Deployment if missing
  when: r_deploy.rc != 0
  ansible.builtin.command: >
    oc create deployment zt-test-app
    --image=registry.access.redhat.com/ubi9/nginx-122:latest
    -n {{ student_ns }}
  changed_when: true

- name: Report setup complete
  ansible.builtin.debug:
    msg: "Module 2 setup complete for {{ student_ns }}"
