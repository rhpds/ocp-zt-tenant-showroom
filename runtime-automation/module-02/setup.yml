---
# Module 2 Setup — ensure module-01 baseline resources exist
- name: Ensure ConfigMap exists
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: zt-test-config
        namespace: "{{ student_ns }}"
      data:
        env: test

- name: Ensure Deployment exists
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: zt-test-app
        namespace: "{{ student_ns }}"
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: zt-test-app
        template:
          metadata:
            labels:
              app: zt-test-app
          spec:
            containers:
              - name: app
                image: registry.access.redhat.com/ubi9/nginx-122:latest

- name: Report setup complete
  ansible.builtin.debug:
    msg: "Module 2 setup complete for {{ student_ns }}"
