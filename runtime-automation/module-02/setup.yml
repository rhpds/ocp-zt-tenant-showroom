---
# Module 2 Setup — verify student namespace and module-01 resources exist
- name: Check ConfigMap exists (module-01 baseline)
  kubernetes.core.k8s_info:
    api_version: v1
    kind: ConfigMap
    name: zt-test-config
    namespace: "{{ student_ns }}"
  register: r_cm

- name: Create ConfigMap if missing
  when: r_cm.resources | length == 0
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: zt-test-config
        namespace: "{{ student_ns }}"
      data:
        env: test

- name: Report setup complete
  ansible.builtin.debug:
    msg: "Module 2 setup complete for {{ student_ns }}"
