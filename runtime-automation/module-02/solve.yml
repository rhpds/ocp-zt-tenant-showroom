---
# Module 2 Solve — create a Secret in student namespace
- name: Create lab-status Secret
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: lab-status
        namespace: "{{ student_ns }}"
      stringData:
        status: complete
        module: "2"

- name: Solve complete
  ansible.builtin.debug:
    msg: "Module 2 solved for {{ student_ns }}"
