---
# Module 2 Solve — apply compliance label

- name: Apply compliance=passed label to namespace
  kubernetes.core.k8s:
    state: patched
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ student_ns }}"
        labels:
          compliance: passed

- name: Solve complete
  ansible.builtin.debug:
    msg: "Module 2 solved — compliance=passed applied to {{ student_ns }}"
