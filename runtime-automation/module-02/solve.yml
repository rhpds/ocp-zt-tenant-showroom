---
# Module 2 Solve — apply compliance label
- name: Get student username
  ansible.builtin.command: oc whoami
  register: r_whoami
  changed_when: false

- name: Set student namespace fact
  ansible.builtin.set_fact:
    student_ns: "zt-test-{{ r_whoami.stdout | trim }}"

- name: Apply compliance label
  ansible.builtin.command: >
    oc label namespace {{ student_ns }} compliance=passed --overwrite
  changed_when: true

- name: Solve complete
  ansible.builtin.debug:
    msg: "Module 2 solved — compliance=passed applied to {{ student_ns }}"
