---
- name: Module 2 Solve -- create lab-status Secret in ztworkspace namespace
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Read showroom-userdata ConfigMap
      ansible.builtin.uri:
        url: >-
          https://kubernetes.default.svc/api/v1/namespaces/{{
            lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/namespace')
          }}/configmaps/showroom-userdata
        headers:
          Authorization: "Bearer {{ lookup('file', '/var/run/secrets/kubernetes.io/serviceaccount/token') }}"
        validate_certs: false
        status_code: 200
      register: r_userdata

    - name: Parse user data
      ansible.builtin.set_fact:
        student_user: "{{ (r_userdata.json.data['user_data.yml'] | from_yaml).user }}"
        student_ns2: "{{ (r_userdata.json.data['user_data.yml'] | from_yaml).user }}-ztworkspace"

    - name: Create lab-status Secret in ztworkspace
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: lab-status
            namespace: "{{ student_ns2 }}"
          stringData:
            status: complete
            module: "2"
