---
# Module 2 Solve — add a label to the student namespace and create a ConfigMap
- name: Apply lab-status label to namespace
  kubernetes.core.k8s:
    host: "{{ k8s_host }}"
    api_key: "{{ k8s_token }}"
    validate_certs: false
    state: patched
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ student_ns }}"
        labels:
          lab-status: complete

- name: Solve complete
  ansible.builtin.debug:
    msg: "Module 2 solved for {{ student_ns }}"
