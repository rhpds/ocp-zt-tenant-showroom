---
# =============================================================================
# setup-automation/main.yml
# Runs at lab deploy time via AgnosticD after ocp4_workload_showroom completes.
# Patches the showroom deployment to add the ZT runner container,
# updates the nginx proxy config, and sets up RBAC.
#
# Expected vars (set by ocp4_workload_showroom):
#   guid                              - lab GUID
#   openshift_cluster_ingress_domain  - cluster apps domain
# =============================================================================

- name: ZT Lab post-deploy setup
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    showroom_ns: "showroom-{{ guid }}"
    lab_user: "devuser-{{ guid }}"
    runner_image: "{{ zt_runner_image | default('ghcr.io/prakhar1985/ocp-zt-runner:latest') }}"

  tasks:

    # -----------------------------------------------------------------------
    # 1. RBAC — allow showroom SA to manage zt-test-* namespaces and resources
    # -----------------------------------------------------------------------
    - name: Create ZT runner ClusterRole
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: "showroom-zt-runner-{{ guid }}"
          rules:
            - apiGroups: [""]
              resources: ["namespaces"]
              verbs: ["get", "list", "create", "patch", "update"]
            - apiGroups: [""]
              resources: ["configmaps", "pods"]
              verbs: ["get", "list", "create", "patch", "update"]
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["get", "list", "create", "patch", "update"]

    - name: Bind ClusterRole to showroom SA
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: "showroom-zt-runner-{{ guid }}"
          subjects:
            - kind: ServiceAccount
              name: showroom
              namespace: "{{ showroom_ns }}"
          roleRef:
            kind: ClusterRole
            name: "showroom-zt-runner-{{ guid }}"
            apiGroup: rbac.authorization.k8s.io

    # -----------------------------------------------------------------------
    # 2. Nginx configmap — add /runner route to port 8501
    # -----------------------------------------------------------------------
    - name: Patch nginx proxy configmap with /runner route
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: showroom-proxy-config
            namespace: "{{ showroom_ns }}"
          data:
            nginx.conf: |
              events {}
              error_log /dev/stdout info;
              http {
                include /etc/nginx/mime.types;
                proxy_cache off;
                expires -1;
                proxy_cache_path /dev/null keys_zone=mycache:10m;

                map $http_upgrade $connection_upgrade {
                    default upgrade;
                    '' close;
                }

                server {
                  listen 8080;
                  absolute_redirect off;

                  location / {
                    proxy_pass http://127.0.0.1:8000;
                    expires off;
                    proxy_cache off;
                    proxy_pass_request_headers on;
                    proxy_set_header Accept-Encoding "gzip";
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                  }

                  location ^~ /runner {
                    rewrite ^/runner(/.*)$ $1 break;
                    proxy_pass http://127.0.0.1:8501/;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection $connection_upgrade;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                  }

                  location = /healthz {
                    proxy_pass http://127.0.0.1:8090/healthz;
                  }
                  location = /readyz {
                    proxy_pass http://127.0.0.1:8090/readyz;
                  }
                }
              }

    # -----------------------------------------------------------------------
    # 3. Patch deployment — add zerotouch-automation runner container
    # -----------------------------------------------------------------------
    - name: Add runner container to showroom deployment
      kubernetes.core.k8s_json_patch:
        api_version: apps/v1
        kind: Deployment
        name: showroom
        namespace: "{{ showroom_ns }}"
        patch:
          - op: add
            path: /spec/template/spec/containers/-
            value:
              name: runner
              image: "{{ runner_image }}"
              imagePullPolicy: IfNotPresent
              ports:
                - containerPort: 8501
                  name: runner
                  protocol: TCP
              env:
                - name: PORT
                  value: "8501"
                - name: DEBUG
                  value: "true"
                - name: GUID
                  value: "{{ guid }}"
                - name: DOMAIN
                  value: "{{ openshift_cluster_ingress_domain }}"
                - name: ANSIBLE_USER
                  value: localonly
                - name: ANSIBLE_PASSWORD
                  value: localonly
                - name: BASTION_HOST
                  value: localhost
                - name: BASTION_PORT
                  value: "22"
                - name: LAB_USER
                  value: "{{ lab_user }}"
              volumeMounts:
                - name: showroom-files
                  mountPath: /app/runtime-automation
                  subPath: repo/runtime-automation
                - name: showroom-files
                  mountPath: /app/artifacts
                  subPath: artifacts
                - name: showroom-files
                  mountPath: /app/logs
                  subPath: logs
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi

    - name: Wait for showroom deployment rollout
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: showroom
        namespace: "{{ showroom_ns }}"
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 120

    - name: Setup complete
      ansible.builtin.debug:
        msg: >-
          ZT lab setup complete.
          Runner: {{ runner_image }}
          Namespace: {{ showroom_ns }}
          Lab user: {{ lab_user }}
